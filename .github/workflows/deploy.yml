name: Deploy to GitHub Pages

on:
  push:
    branches:
      - main
  workflow_dispatch:

permissions:
  contents: read
  pages: write
  id-token: write

concurrency:
  group: pages
  cancel-in-progress: true

jobs:
  build:
    runs-on: ubuntu-latest
    steps:
      - name: Checkout
        uses: actions/checkout@v5

      - name: Resolve site URL and base path
        run: |
          OWNER="${{ github.repository_owner }}"
          REPO="${{ github.event.repository.name }}"
          OWNER_LOWER="$(printf '%s' "$OWNER" | tr '[:upper:]' '[:lower:]')"
          CUSTOM_DOMAIN="${{ vars.CUSTOM_DOMAIN }}"
          CUSTOM_DOMAIN_LOWER="$(printf '%s' "$CUSTOM_DOMAIN" | tr '[:upper:]' '[:lower:]')"

          if [ -n "$CUSTOM_DOMAIN_LOWER" ]; then
            echo "SITE_URL=https://${CUSTOM_DOMAIN_LOWER}" >> "$GITHUB_ENV"
            echo "BASE_PATH=/" >> "$GITHUB_ENV"
          else
            echo "SITE_URL=https://${OWNER_LOWER}.github.io" >> "$GITHUB_ENV"
            if [ "$REPO" = "${OWNER}.github.io" ]; then
              echo "BASE_PATH=/" >> "$GITHUB_ENV"
            else
              echo "BASE_PATH=/${REPO}" >> "$GITHUB_ENV"
            fi
          fi

      - name: Install, build, and upload site
        uses: withastro/action@v6
        with:
          node-version: 24
        env:
          SITE_URL: ${{ env.SITE_URL }}
          BASE_PATH: ${{ env.BASE_PATH }}

  deploy:
    needs: build
    runs-on: ubuntu-latest
    environment:
      name: github-pages
      url: ${{ steps.deployment.outputs.page_url }}
    steps:
      - name: Deploy to GitHub Pages
        id: deployment
        uses: actions/deploy-pages@v4
